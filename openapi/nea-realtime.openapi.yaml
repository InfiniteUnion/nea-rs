        west:
          $ref: '#/components/schemas/NeaRegionalReading'
        north:
          $ref: '#/components/schemas/NeaRegionalReading'
        south:
          $ref: '#/components/schemas/NeaRegionalReading'
        central:
          $ref: '#/components/schemas/NeaRegionalReading'
      required:
      - central
      - east
      - north
      - south
      - west
    PsiSo2TwentyFourHourRegional:
      type: object
      description: Concentration is measured in micrograms per cubic metre
      properties:
        east:
          $ref: '#/components/schemas/NeaRegionalReading'
        west:
          $ref: '#/components/schemas/NeaRegionalReading'
        north:
          $ref: '#/components/schemas/NeaRegionalReading'
        south:
          $ref: '#/components/schemas/NeaRegionalReading'
        central:
          $ref: '#/components/schemas/NeaRegionalReading'
      required:
      - central
      - east
      - north
      - south
      - west
    Pm25Data:
      type: object
      properties:
        regionMetadata:
          type: array
          items:
            $ref: '#/components/schemas/NeaRegionMetadata'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pm25Snapshot'
        paginationToken:
          type: string
          description: Token to retrieve next page if exists
          example: b2Zmc2V0PTEwMA== (you will see this token only if next page exists)
      required:
      - items
      - regionMetadata
    Pm25Snapshot:
      type: object
      properties:
        date:
          $ref: '#/components/schemas/NeaDate'
        updatedTimestamp:
          $ref: '#/components/schemas/NeaOffsetDateTime'
        timestamp:
          $ref: '#/components/schemas/NeaOffsetDateTime'
        readings:
          $ref: '#/components/schemas/Pm25Readings'
      required:
      - date
      - readings
      - timestamp
      - updatedTimestamp
    Pm25Readings:
      type: object
      description: Overall and regional PSI data including pollutant concentrations and sub-indices
      properties:
        pm25_one_hourly:
          $ref: '#/components/schemas/Pm25OneHourRegional'
      required:
      - pm25_one_hourly
    Pm25OneHourRegional:
      type: object
      properties:
        east:
          $ref: '#/components/schemas/NeaPm25HourlyReading'
        west:
          $ref: '#/components/schemas/NeaPm25HourlyReading'
        north:
          $ref: '#/components/schemas/NeaPm25HourlyReading'
        south:
          $ref: '#/components/schemas/NeaPm25HourlyReading'
        central:
          $ref: '#/components/schemas/NeaPm25HourlyReading'
      required:
      - central
      - east
      - north
      - south
      - west
    UvData:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/UvDayRecord'
        paginationToken:
          type: string
          description: Token to retrieve next page if exists
          example: b2Zmc2V0PTEwMA== (you will see this token only if next page exists)
      required:
      - records
    UvDayRecord:
      type: object
      properties:
        index:
          type: array
          items:
            $ref: '#/components/schemas/UvHourlyIndex'
        date:
          $ref: '#/components/schemas/NeaDate'
        updatedTimestamp:
          $ref: '#/components/schemas/NeaOffsetDateTime'
        timestamp:
          $ref: '#/components/schemas/NeaOffsetDateTime'
      required:
      - date
      - index
      - timestamp
      - updatedTimestamp
    UvHourlyIndex:
      type: object
      description: Reverse-chronologically ordered indexes
      properties:
        hour:
          $ref: '#/components/schemas/NeaOffsetDateTime'
        value:
          $ref: '#/components/schemas/NeaUvIndex'
      required:
      - hour
      - value
    WeatherSubApiData:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/WeatherSubApiDayRecord'
        paginationToken:
          type: string
          description: Token to retrieve next page if exists
          example: b2Zmc2V0PTEwMA== (you will see this token only if next page exists)
    WeatherSubApiDayRecord:
      type: object
      properties:
        datetime:
          $ref: '#/components/schemas/NeaOffsetDateTime'
        item:
          $ref: '#/components/schemas/WeatherSubApiObservation'
        updatedTimestamp:
          $ref: '#/components/schemas/NeaOffsetDateTime'
    WeatherSubApiObservation:
      type: object
      description: A weather observation for the lightning
      properties:
        type:
          type: string
          description: Type of the weather information (`observation` or `forecast`). Lightning is always `observation.
          example: observation
        isStationData:
          type: boolean
          description: Indicates whether the weather information includes station information.
          example: false
        readings:
          type: array
          items:
            $ref: '#/components/schemas/WeatherSubApiLightningReading'
    WeatherSubApiLightningReading:
      type: object
      properties:
        location:
          $ref: '#/components/schemas/NeaGeoPoint'
        datetime:
          $ref: '#/components/schemas/NeaOffsetDateTime'
        text:
          type: string
          description: A textual description of the weather event, which can include types such as "Cloud to Cloud" or "Cloud
            to Ground."
          example: Cloud to Cloud
        type:
          $ref: '#/components/schemas/NeaLightningType'
    WeatherSubApiInvalidParamsError:
      type: object
      properties:
        code:
          type: number
        name:
          type: string
        errorMsg:
          type: string
    NeaMeasurementUnit:
      type: string
      description: Unit of measure for NEA station readings and outlook ranges
      enum:
      - deg C
      - Degrees Celsius
      - Percentage
      - percentage
      - knots
      - degrees
      - mm
      example: deg C
      x-satay:
        enum-variants:
          deg C: DegC
          Degrees Celsius: DegreesCelsius
          Percentage: Percentage
          percentage: PercentLower
          knots: Knots
          degrees: Degrees
          mm: Millimeters
