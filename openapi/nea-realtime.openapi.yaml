openapi: 3.1.0
info:
  title: NEA Singapore Real-time APIs
  description: 'Real-time environmental and weather data from Singapore''s National Environment Agency (NEA), served via data.gov.sg.


    Base URL: <https://api-open.data.gov.sg/v2/real-time/api>


    Authentication: All endpoints are publicly accessible without an API key for testing. Include the optional `x-api-key`
    header for higher rate limits (6/12/30 requests per 10s without/dev/prod key). See <https://guide.data.gov.sg/developer-guide/api-overview/api-rate-limits>


    Common query parameters:


    - `date`: SGT date filter (YYYY-MM-DD). Omit for latest reading.


    - `paginationToken`: For paginated historical results when using date filters.


    Sources: Official OpenAPI specs from <https://data.gov.sg> NEA dataset pages.'
  version: 1.0.11
  contact:
    email: feedback@data.gov.sg
servers:
- url: https://api-open.data.gov.sg/v2/real-time/api
tags:
- name: Air Quality
  description: PSI and PM2.5 readings by region. Updated every 15 minutes.
- name: Weather Readings
  description: Station-level weather observations (up to 1-minute intervals).
- name: Weather Forecast
  description: Area and regional weather forecasts from NEA MSS.
- name: Environment
  description: UV index, lightning, and heat stress (WBGT) data.
paths:
  /psi:
    get:
      tags:
      - Air Quality
      summary: Retrieve the latest PSI information
      description: '<https://api-open.data.gov.sg/v2/real-time/api/psi>


        - Readings are provided for each major region in Singapore


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - The `region_metadata` field in the response provides longitude/latitude information for the regions. You can use
        that to place the readings on a map.


        - Unit of measure for readings is `PSI Value`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: PSI Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PsiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      operationId: psi
  /pm25:
    get:
      tags:
      - Air Quality
      summary: PM 2.5
      description: '<https://api-open.data.gov.sg/v2/real-time/api/pm25>


        - Readings are provided for each major region in Singapore


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - The `region_metadata` field in the response provides longitude/latitude information for the regions. You can use
        that to place the readings on a map.


        - Unit of measure for readings is `µg/m3`.'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: PM 2.5 Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pm25Response'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      operationId: pm25
  /air-temperature:
    get:
      summary: Get air temperature readings across Singapore
      description: '<https://api-open.data.gov.sg/v2/real-time/api/air-temperature>


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - Unit of measure for readings is `°C`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: Air Temperature Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirTemperatureResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Readings
      operationId: air_temperature
  /relative-humidity:
    get:
      summary: Get relative humidity readings across Singapore
      description: '<https://api-open.data.gov.sg/v2/real-time/api/relative-humidity>


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - Unit of measure for readings is `%`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: Relative Humidity Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelativeHumidityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Readings
      operationId: relative_humidity
  /wind-speed:
    get:
      summary: Get wind speed readings across Singapore
      description: '<https://api-open.data.gov.sg/v2/real-time/api/wind-speed>


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - Unit of measure for readings is `Knots`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: Wind Speed Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindSpeedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Readings
      operationId: wind_speed
  /wind-direction:
    get:
      summary: Get wind direction readings across Singapore
      description: '<https://api-open.data.gov.sg/v2/real-time/api/wind-direction>


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - Unit of measure for readings is `°`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: Wind Direction Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindDirectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Readings
      operationId: wind_direction
  /rainfall:
    get:
      summary: Get rainfall readings across Singapore
      description: '<https://api-open.data.gov.sg/v2/real-time/api/rainfall>


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - Unit of measure for readings is `mm`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: Rainfall Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RainfallResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Readings
      operationId: rainfall
  /two-hr-forecast:
    get:
      summary: Retrieve the latest two hour weather forecast
      description: '<https://api-open.data.gov.sg/v2/real-time/api/two-hr-forecast>


        - Forecasts are given for multiple areas in Singapore


        - Filter for specific date or date-time by providing `date` in query parameter (YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS).


        - example: `?date=2024-07-16` or `?date=2024-07-16T23:59:00`


        - Forecasts are valid for two hours, for example, the validity period of the forecast at 1pm is 1pm to 3pm


        - If `date` is not provided in query parameter, API will return the latest reading'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: 2 Hour Weather Forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoHrForecastResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Forecast
      operationId: two_hr_forecast
  /twenty-four-hr-forecast:
    get:
      summary: Retrieve the latest 24 hour weather forecast
      description: '<https://api-open.data.gov.sg/v2/real-time/api/twenty-four-hr-forecast>


        - Updated multiple times throughout the day


        - Filter for specific date or date-time by providing `date` in query parameter (YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS).


        - example: `?date=2024-07-16` or `?date=2024-07-16T23:59:00`


        - Forecasts are valid for twenty four hours, for example, the validity period of the forecast at 1st Jan 1pm is from
        1st Jan 1pm to 2nd Jan 1pm


        - If `date` is not provided in query parameter, API will return the latest reading'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: 24 Hour Weather Forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwentyFourHrForecastResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Forecast
      operationId: twenty_four_hr_forecast
  /four-day-outlook:
    get:
      summary: Retrieve the latest 4 day weather forecast
      description: '<https://api-open.data.gov.sg/v2/real-time/api/four-day-outlook>


        - The forecast is for the next 4 days.


        - Filter for specific date or date-time by providing `date` in query parameter (YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS).


        - example: `?date=2024-07-16` or `?date=2024-07-16T23:59:00`


        - Forecasts are valid for four days, for example, the validity period of the forecast at 1st Jan 1pm is from 1st Jan
        1pm to 5th Jan 1pm


        - If `date` is not provided in query parameter, API will return the latest reading'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: 4 Day Weather Forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FourDayOutlookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Weather Forecast
      operationId: four_day_outlook
  /uv:
    get:
      summary: Retrieve the latest UV index information
      description: '<https://api-open.data.gov.sg/v2/real-time/api/uv>


        - Updated between 7 AM and 7 PM everyday


        - The UV index value is averaged over the preceding hour


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2024-07-16`


        - If `date` is not provided in query parameter, API will return the latest reading


        - Unit of measure for readings is `Ultraviolet Index`'
      parameters:
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: UV Index Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UvResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Environment
      operationId: uv
  /weather:
    get:
      summary: Retrieve the latest lightning observation
      description: 'Unified weather sub-API endpoint.


        - `?api=lightning` — Cloud-to-ground and cloud-to-cloud lightning strikes. Updated every ~2–3 minutes.


        - `?api=wbgt` — Wet Bulb Globe Temperature heat stress readings. Updated every 15 minutes.


        <https://api-open.data.gov.sg/v2/real-time/api/weather?api=lightning>


        - Updated multiple times throughout the day


        - Filter for a specific date by providing `date` in query parameter (YYYY-MM-DD).


        - example: `?date=2025-01-16`


        - If `date` is not provided in query parameter, API will return the latest lightning observation'
      parameters:
      - $ref: '#/components/parameters/WeatherApiQuery'
      - $ref: '#/components/parameters/DateQuery'
      - $ref: '#/components/parameters/PaginationToken'
      - $ref: '#/components/parameters/ApiKeyHeader'
      responses:
        '200':
          description: Lightning Observations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSubApiResponse'
        '400':
          $ref: '#/components/responses/BadRequestSubApi'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      tags:
      - Environment
      operationId: weather_sub_api
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Optional API key from <https://data.gov.sg> for higher rate limits.
  parameters:
    DateQuery:
      name: date
      in: query
      description: SGT date for which to retrieve data (YYYY-MM-DD). Omit for latest.
      schema:
        $ref: '#/components/schemas/NeaDate'
    PaginationToken:
      name: paginationToken
      in: query
      description: Pagination token for subsequent pages (only when date filter is used and more pages exist).
      schema:
        type: string
    ApiKeyHeader:
      name: x-api-key
      in: header
      description: Optional API key for higher rate limits.
      required: false
      schema:
        type: string
    WeatherApiQuery:
      name: api
      in: query
      description: Sub-API selector (lightning or wbgt). Required.
      required: true
      schema:
        $ref: '#/components/schemas/NeaWeatherSubApi'
      example: lightning
  responses:
    BadRequest:
      description: Invalid request (bad date format or pagination token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InvalidParamsError'
    BadRequestSubApi:
      description: Invalid HTTP request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WeatherSubApiInvalidParamsError'
    NotFound:
      description: Weather data not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataNotFoundError'
    TooManyRequests:
      description: Rate limit exceeded (429). Wait and retry, or use an x-api-key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
    MissingAuth:
      description: Missing or invalid authentication (403). Some legacy paths require x-api-key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MissingAuthResponse'
  schemas:
    PsiResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/PsiData'
      required:
      - code
      - data
      - errorMsg
    Pm25Response:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/Pm25Data'
      required:
      - code
      - data
      - errorMsg
    AirTemperatureResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/AirTemperatureData'
      required:
      - code
      - data
      - errorMsg
    RelativeHumidityResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/RelativeHumidityData'
      required:
      - code
      - data
      - errorMsg
    WindSpeedResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/WindSpeedData'
      required:
      - code
      - data
      - errorMsg
    WindDirectionResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/WindDirectionData'
      required:
      - code
      - data
      - errorMsg
    RainfallResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/RainfallData'
      required:
      - code
      - data
      - errorMsg
    TwoHrForecastResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/TwoHrForecastData'
      required:
      - code
      - data
      - errorMsg
    TwentyFourHrForecastResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/TwentyFourHrForecastData'
      required:
      - code
      - data
      - errorMsg
    FourDayOutlookResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/FourDayOutlookData'
      required:
      - code
      - data
      - errorMsg
    UvResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/UvData'
      required:
      - code
      - data
      - errorMsg
    WeatherSubApiResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/NeaSuccessCode'
        errorMsg:
          type: string
          description: Error message (empty string for success)
        data:
          $ref: '#/components/schemas/WeatherSubApiData'
    InvalidParamsError:
      type: object
      properties:
        code:
          type: number
          example: 4
        name:
          type: string
          example: ERROR_PARAMS
        errorMsg:
          $ref: '#/components/schemas/NeaInvalidParamsErrorMsg'
    InvalidParamsError22:
      type: object
      properties:
        code:
          type: number
        name:
          type: string
        errorMsg:
          type: string
    DataNotFoundError:
      type: object
      properties:
        code:
          type: number
          example: 17
        name:
          type: string
          example: REAL_TIME_API_DATA_NOT_FOUND
        errorMsg:
          type: string
          example: Data not found
    RateLimitError:
      type: object
      properties:
        code:
          type: number
          example: 24
        name:
          type: string
          example: TOO_MANY_REQUESTS
        errorMsg:
          type: string
          example: Rate limit exceeded
    MissingAuthResponse:
      type: object
      properties:
        message:
          type: string
          example: Missing Authentication Token
    NeaSuccessCode:
      type: integer
      description: Response status code (0 for success)
      minimum: 0
      maximum: 0
      example: 0
    NeaOffsetDateTime:
      type: string
      description: ISO 8601 date or date-time in Singapore Time (SGT)
      x-satay:
        parse-as: offset-datetime
    NeaDate:
      type: string
      description: SGT calendar date (YYYY-MM-DD)
      example: '2024-07-16'
      x-satay:
        parse-as: date
    NeaLatitude:
      type: number
      description: WGS84 latitude for Singapore
      minimum: 1.0
      maximum: 1.5
    NeaLongitude:
      type: number
      description: WGS84 longitude for Singapore
      minimum: 103.5
      maximum: 104.2
    NeaRegionalReading:
      type: integer
      description: Regional air-quality or index reading
      minimum: 0
      maximum: 500
    NeaPm25HourlyReading:
      type: integer
      description: Regional PM2.5 one-hour reading (µg/m³)
      minimum: 0
      maximum: 500
    NeaWindDirectionDegrees:
      type: integer
      description: Wind direction in degrees
      minimum: 0
      maximum: 360
    NeaUvIndex:
      type: integer
      description: UV index for the hour
      minimum: 0
      maximum: 16
    NeaHumidityPercent:
      type: number
      description: Relative humidity percentage
      minimum: 0
      maximum: 100
    NeaTemperatureCelsius:
      type: number
      description: Air temperature in degrees Celsius
      minimum: 15
      maximum: 45
    NeaWindSpeedKmh:
      type: number
      description: Wind speed in km/h
      minimum: 0
      maximum: 120
    NeaForecastCode:
      type: string
      description: NEA MSS short weather forecast code
      enum:
      - FA
      - FN
      - FW
      - CL
      - PC
      - PN
      - HZ
      - SH
      - WI
      - MS
      - FG
      - LR
      - MR
      - HR
      - PS
      - LS
      - HS
      - TS
      - HT
      - HG
      - TL
      x-satay:
        enum-variants:
          FA: FairDay
          FN: FairNight
          FW: FairAndWarm
          CL: Cloudy
          PC: PartlyCloudyDay
          PN: PartlyCloudyNight
          HZ: Hazy
          SH: SlightlyHazy
          WI: Windy
          MS: Mist
          FG: Fog
          LR: LightRain
          MR: ModerateRain
          HR: HeavyRain
          PS: PassingShowers
          LS: LightShowers
          HS: HeavyShowers
          TS: ThunderyShowers
          HT: HeavyThunderyShowers
          HG: HeavyThunderyShowersWithGustyWinds
          TL: ThunderyShowersAlt
    NeaLightningType:
      type: string
      description: Lightning event type (C = cloud-to-cloud, G = cloud-to-ground)
      enum:
      - C
      - G
      x-satay:
        enum-variants:
          C: CloudToCloud
          G: CloudToGround
    NeaForecastText:
      type: string
      description: NEA MSS human-readable weather forecast text
      enum:
      - Fair
      - Fair (Day)
      - Fair (Night)
      - Fair and Warm
      - Partly Cloudy
      - Partly Cloudy (Day)
      - Partly Cloudy (Night)
      - Cloudy
      - Hazy
      - Slightly Hazy
      - Windy
      - Mist
      - Fog
      - Light Rain
      - Moderate Rain
      - Heavy Rain
      - Passing Showers
      - Light Showers
